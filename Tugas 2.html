<!DOCTYPE html>
<html>
<head>
<title>Tugas 2 - Formulir</title>

<style>
body{
font-family:Segoe UI;
background:#1f3d2b;
color:white;
margin:0;
}

header{
background:#2f5d46;
padding:20px;
text-align:center;
font-size:25px;
}

.container{
width:80%;
margin:auto;
background:#274c38;
padding:25px;
margin-top:20px;
border-radius:15px;
}

fieldset{
margin-bottom:20px;
border-radius:10px;
padding:15px;
}

legend{
font-weight:bold;
font-size:18px;
}

label{
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border-radius:8px;
border:none;
}

.radio-group{
margin-top:10px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#355f4a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#3f7a5e;
}
</style>

</head>

<body>

<header>
🐱 Tugas 02 — Formulir Data Pengguna
</header>

<div class="container">

<form>

<!-- DATA DEMOGRAFI -->
<fieldset>
<legend>Data Demografi</legend>

<label>Nama Pengguna</label>
<input type="text" required>

<label>Tanggal Lahir</label>
<input type="date" required>

<label>Alamat</label>
<textarea></textarea>

<label>No Telepon</label>
<input type="tel">

<label>Email</label>
<input type="email">

<label>Pendidikan</label>
<select required>
<option>Pilih Pendidikan</option>
<option>SMA/SMK</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
<option>S3</option>
</select>

</fieldset>


<!-- DATA BANK -->
<fieldset>
<legend>Data Bank</legend>

<label>Nama Bank</label>
<select required>
<option>Pilih Bank</option>
<option>Bank BRI</option>
<option>Bank Mandiri</option>
<option>Bank BNI</option>
<option>Bank BCA</option>
<option>Bank Syariah Indonesia</option>
</select>

<label>Nomor Rekening</label>
<input type="number" required>

</fieldset>


<!-- DATA TRANSAKSI -->
<fieldset>
<legend>Data Transaksi Keuangan</legend>

<label>Tanggal Transaksi</label>
<input type="date" required>

<label>Uraian Transaksi</label>
<textarea></textarea>

<label>Jenis Transaksi</label>

<div class="radio-group">
<input type="radio" name="jenis"> Transfer
<input type="radio" name="jenis"> Pembayaran
<input type="radio" name="jenis"> Penarikan
</div>

<label>Debet</label>
<input type="number">

<label>Kredit</label>
<input type="number">

</fieldset>

<button type="submit">Simpan Data</button>

</form>

</div>

</body>
</html>
