<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Tugas 2 - Formulir</title>

<style>

/* ================= THEME SAMA DENGAN WEBSITE UTAMA ================= */

body{
margin:0;
font-family:Segoe UI;
background:#ece7df;
color:#3b2f2f;
overflow-x:hidden;
}

/* PAW BACKGROUND */
body::before{
content:"🐾 🐾 🐾 🐾 🐾 🐾 🐾 🐾 🐾";
position:fixed;
width:100%;
height:100%;
font-size:80px;
opacity:.08;
pointer-events:none;
animation:pawMove 40s linear infinite;
}

@keyframes pawMove{
from{transform:translateY(0);}
to{transform:translateY(-400px);}
}

/* HEADER */
header{
background:#c7a17a;
color:white;
padding:20px;
text-align:center;
font-size:24px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

/* CONTAINER */
.container{
width:85%;
max-width:700px;
margin:auto;
background:#fffaf4;
padding:25px;
margin-top:30px;
border-radius:15px;
border:2px solid #c7a17a;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* FIELDSET */
fieldset{
margin-bottom:20px;
border-radius:12px;
padding:15px;
border:2px solid #c7a17a;
background:#f3e3d1;
}

legend{
font-weight:bold;
font-size:18px;
color:#3b2f2f;
}

/* FORM */
label{
display:block;
margin-top:10px;
font-weight:500;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #c7a17a;
background:white;
font-family:Segoe UI;
}

/* RADIO */
.radio-group{
margin-top:10px;
}

/* BUTTON */
button{
margin-top:20px;
padding:12px 25px;
background:#c7a17a;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
transition:.3s;
}

button:hover{
background:#b28b63;
transform:scale(1.05);
}

/* MOBILE */
@media(max-width:600px){
.container{
width:92%;
}
}

</style>

</head>

<body>

<header>
🐾 Formulir Data Pengguna
</header>

<div class="container">

<form>

<!-- DATA DEMOGRAFI -->
<fieldset>
<legend>Data Demografi</legend>

<label>Nama Pengguna</label>
<input type="text" required>

<label>Tanggal Lahir</label>
<input type="date" required>

<label>Alamat</label>
<textarea></textarea>

<label>No. Telepon</label>
<input type="tel">

<label>Email</label>
<input type="email">

<label>Pendidikan</label>
<select required>
<option>Pilih Pendidikan</option>
<option>SMA/SMK</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
<option>S3</option>
</select>

</fieldset>


<!-- DATA BANK -->
<fieldset>
<legend>Data Bank</legend>

<label>Nama Bank</label>
<select required>
<option>Pilih Bank</option>
<option>Bank BRI</option>
<option>Bank Mandiri</option>
<option>Bank BNI</option>
<option>Bank BCA</option>
<option>Bank Syariah Indonesia</option>
</select>

<label>Nomor Rekening</label>
<input type="number" required>

</fieldset>


<!-- DATA TRANSAKSI -->
<fieldset>
<legend>Data Transaksi Keuangan</legend>

<label>Tanggal Transaksi</label>
<input type="date" required>

<label>Uraian Transaksi</label>
<textarea></textarea>

<label>Jenis Transaksi</label>

<div class="radio-group">
<input type="radio" name="jenis"> Transfer
<input type="radio" name="jenis"> Pembayaran
<input type="radio" name="jenis"> Penarikan
</div>

<label>Debet</label>
<input type="number">

<label>Kredit</label>
<input type="number">

</fieldset>

<button type="submit">Simpan Data</button>

</form>

</div>

</body>
</html>
