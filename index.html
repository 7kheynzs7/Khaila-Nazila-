  <!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tugas 1</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      scroll-behavior: smooth;
    }

    /* Navbar */
    nav {
      background: rgba(0,0,0,0.7);
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00d4ff;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    h2 {
      text-align: center;
      margin: 40px 0 20px;
    }

    /* Container */
    .container {
      padding: 20px;
      text-align: center;
    }

    /* Card Biodata */
    .card {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid white;
    }

    /* Galeri */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Video */
    .video-container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 15px;
      overflow: hidden;
    }

    .video-wrapper iframe {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      padding: 15px;
      text-align: center;
      background: rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>
